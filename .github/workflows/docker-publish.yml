name: Docker Publish

on:
  push:
    branches: [ "main" ]
    # 仅在构建相关文件变更时触发 Push 构建
    paths:
      - 'Dockerfile*'
      - 'docker-entrypoint.sh'
      - '.github/workflows/docker-publish.yml'
    tags: [ 'v*' ]
  # 支持上游通过 Webhook 触发构建 (例如上游发布新 Release)
  repository_dispatch:
    types: [upstream_release]
  # 每天定时检查一次上游新版本
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# 并发控制：如果同一个分支上有新的运行，则取消正在进行的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 预准备阶段：确定版本、镜像名及构建决策
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.check.outputs.should_build }}
      image_name: ${{ steps.info.outputs.image_name }}
      gh_version: ${{ steps.versions.outputs.gh_version }}
      yq_version: ${{ steps.versions.outputs.yq_version }}
      lg_version: ${{ steps.versions.outputs.lg_version }}
    steps:
      - name: Fetch repository info & version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GH_TOKEN 避免 API 速率限制
          RESPONSE=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/openclaw/openclaw/releases/latest")
          VERSION=$(echo "$RESPONSE" | jq -r '.tag_name')

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::warning title=API Error::Failed to fetch latest release, falling back to v0.0.0"
            VERSION="v0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Fetch tool versions (gh, yq, lazygit)
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 GH_TOKEN 避免 API 速率限制
          # GitHub CLI
          GH_VERSION=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/cli/cli/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          echo "gh_version=${GH_VERSION}" >> $GITHUB_OUTPUT

          # yq
          YQ_VERSION=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/mikefarah/yq/releases/latest" | jq -r '.tag_name')
          echo "yq_version=${YQ_VERSION}" >> $GITHUB_OUTPUT

          # lazygit
          LG_VERSION=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | jq -r '.tag_name' | sed 's/^v//')
          echo "lg_version=${LG_VERSION}" >> $GITHUB_OUTPUT

          echo "Fetched versions: gh=${GH_VERSION}, yq=${YQ_VERSION}, lg=${LG_VERSION}"

      - name: Normalize Image Name
        id: info
        run: |
          # 强制转换为小写，解决 GitHub Repository 包含大写字符导致的镜像路径规范问题
          LOWER_IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${LOWER_IMAGE_NAME}" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image Already Exists
        id: check
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_PATH="${{ env.REGISTRY }}/${{ steps.info.outputs.image_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          EVENT="${{ github.event_name }}"
          
          echo "Build Reason Logic Audit:"
          echo "  - Event Type: $EVENT"
          echo "  - Target Tag: ${IMAGE_PATH}:${VERSION}"
          
          # 策略审计结论：
          # 1. 代码推送或手动触发 -> 视为构建逻辑变更 -> 强制构建
          # 2. 定时任务或外部信号 -> 核心逻辑未变 -> 仅在版本更新时构建 (智能跳过)
          if [[ "$EVENT" == "push" || "$EVENT" == "workflow_dispatch" ]]; then
            echo "Decision: Code/Manual trigger detected. Proceeding with build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            if docker manifest inspect "${IMAGE_PATH}:${VERSION}" > /dev/null 2>&1; then
              echo "Decision: Version ${VERSION} already exists in registry. Skipping..."
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "Decision: New version or first-time build. Proceeding."
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  # 核心构建阶段 - 基座镜像 (Standard)
  build-base:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch & Prepare Upstream Source
        shell: bash
        run: |
          set -euo pipefail
          REPO="openclaw/openclaw"
          VERSION="${{ needs.prepare.outputs.version }}"
          URL="https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz"
          
          echo "Downloading upstream source: $VERSION"
          mkdir -p .openclaw_src
          curl -fsSL "$URL" | tar -xzC .openclaw_src --strip-components=1
          
          cp -f Dockerfile* .openclaw_src/ 2>/dev/null || true
          cp -f docker-entrypoint.sh .openclaw_src/ 2>/dev/null || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ needs.prepare.outputs.version }}-,format=short
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push standard
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GH_VERSION=${{ needs.prepare.outputs.gh_version }}
            YQ_VERSION=${{ needs.prepare.outputs.yq_version }}
            LG_VERSION=${{ needs.prepare.outputs.lg_version }}

  # 核心构建阶段 - 变体镜像 (Go, Java, Office)
  build-variants:
    needs: [prepare, build-base]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: go, dockerfile: Dockerfile.go, suffix: '-go' }
          - { name: java, dockerfile: Dockerfile.java, suffix: '-java' }
          - { name: office, dockerfile: Dockerfile.office, suffix: '-office' }
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch & Prepare Upstream Source
        shell: bash
        run: |
          set -euo pipefail
          REPO="openclaw/openclaw"
          VERSION="${{ needs.prepare.outputs.version }}"
          URL="https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz"
          
          echo "Downloading upstream source: $VERSION"
          mkdir -p .openclaw_src
          curl -fsSL "$URL" | tar -xzC .openclaw_src --strip-components=1
          
          cp -f Dockerfile* .openclaw_src/ 2>/dev/null || true
          cp -f docker-entrypoint.sh .openclaw_src/ 2>/dev/null || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}
          tags: |
            type=sha,prefix=${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}-,format=short
            type=raw,value=${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}
            type=raw,value=latest${{ matrix.variant.suffix }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.variant.name }}
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/${{ matrix.variant.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
