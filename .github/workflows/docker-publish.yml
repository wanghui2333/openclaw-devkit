name: Docker Publish

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile*'
      - 'docker-entrypoint.sh'
      - 'Makefile'
      - '.github/workflows/docker-publish.yml'
    tags: [ 'v*' ]
  repository_dispatch:
    types: [upstream_release]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Use lower case for image names to satisfy GHCR requirements
  IMAGE_BASE: openclaw-runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      repo_owner: ${{ steps.repo.outputs.owner }}
    steps:
      - name: Fetch version
        id: version
        run: |
          VERSION=$(curl -fsSL "https://api.github.com/repos/openclaw/openclaw/releases/latest" | jq -r '.tag_name')
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT
      - name: Get repo owner
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

  # Tier 1: Foundation
  build-base:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push base
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/${{ env.IMAGE_BASE }}:base

  # Tier 2: Stacks
  build-stacks:
    needs: [prepare, build-base]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: [go, java, office]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push stack
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.stacks
          target: stack-${{ matrix.stack }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
             BASE_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/${{ env.IMAGE_BASE }}:base
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/${{ env.IMAGE_BASE }}:${{ matrix.stack }}

  # Tier 3: Product Images
  build-products:
    needs: [prepare, build-stacks]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - stack: base
            tag: 'latest'
          - stack: go
            tag: 'go'
          - stack: java
            tag: 'java'
          - stack: office
            tag: 'office'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push product
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/${{ env.IMAGE_BASE }}:${{ matrix.stack }}
            OPENCLAW_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/openclaw-devkit:${{ matrix.tag }}
            ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repo_owner }}/openclaw-devkit:${{ needs.prepare.outputs.version }}${{ matrix.tag != 'latest' && format('-{0}', matrix.tag) || '' }}
