name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 首先获取 OpenClaw 版本号
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Fetch OpenClaw version
        id: version
        run: |
          VERSION=$(curl -fsSL "https://api.github.com/repos/openclaw/openclaw/releases/latest" | jq -r '.tag_name')
          echo "OpenClaw version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # 并行构建三个 Docker 镜像
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: standard
            dockerfile: Dockerfile
            suffix: ''
          - name: java
            dockerfile: Dockerfile.java
            suffix: '-java'
          - name: office
            dockerfile: Dockerfile.office
            suffix: '-office'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OpenClaw Source
        run: |
          REPO="openclaw/openclaw"
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Building OpenClaw version: $VERSION"
          URL="https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz"
          mkdir -p .openclaw_src
          curl -fsSL "$URL" | tar -xzC .openclaw_src --strip-components=1
          # 使用 DevKit 的 Dockerfile 替换源码中的文件
          cp Dockerfile .openclaw_src/Dockerfile
          cp Dockerfile.java .openclaw_src/Dockerfile.java
          cp Dockerfile.office .openclaw_src/Dockerfile.office

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push ${{ matrix.variant.name }} Image
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/${{ matrix.variant.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}${{ matrix.variant.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest${{ matrix.variant.suffix }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
